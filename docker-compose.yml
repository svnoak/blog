services:
  bloggy:
    build: .
    ports:
      - "8080:8080"
    volumes:
      # Persist the SQLite database across restarts
      - bloggy-data:/data
      # Override config at runtime without rebuilding the image
      - ./config.toml:/app/config.toml:ro
    environment:
      BLOGGY_DB_PATH: /data/bloggy.db
    restart: unless-stopped

volumes:
  bloggy-data:
