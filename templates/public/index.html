{{define "public/index.html"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Tenant.Name}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,400&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="public-page">
  <header class="public-header">
    <a href="/" class="site-name">{{.Tenant.Name}}</a>
  </header>
  <main class="public-main">
    {{if .Posts}}
    <ul class="post-list">
      {{range .Posts}}
      <li class="post-list-item">
        <a href="/posts/{{.Slug}}" class="post-list-title">{{.Title}}</a>
        <div class="post-list-meta">
          Written by {{.AuthorName}} on {{formatDate .PublishedAt}}
        </div>
      </li>
      {{end}}
    </ul>
    {{else}}
    <p class="empty-state">Nothing here yet.</p>
    {{end}}
  </main>
</body>
</html>
{{end}}
